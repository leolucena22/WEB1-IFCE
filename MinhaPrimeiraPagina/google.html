<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Google</title>
  <link rel="shortcut icon" href="https://pt.m.wikipedia.org/wiki/Ficheiro:Google_Favicon_2025.svg" type="image/x-icon">
</head>

<style>
  ul {
    list-style-type: none;
    display: flex;
    justify-content: flex-end;
    padding: 10px;
  }

  header ul li {
    margin-left: 20px;
    font-family: Arial, sans-serif;
  }

  header ul li img {
    width: 20px;
    height: 20px;
    vertical-align: middle;
    margin-right: 5px;
  }

  #main {
    text-align: center;
    margin-top: 50px;
  }

  #imagem img {
    width: 200px;
  }

  #pesquisa {
    width: 400px;
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 1rem;
    outline: none;
  }
</style>

<body>

  <header>
    <ul>
      <li>Gmail</li>
      <li>Imagens</li>
      <li><img
          src="https://icon-icons.com/download-file?file=https%3A%2F%2Fimages.icon-icons.com%2F1369%2FPNG%2F512%2F-apps_90405.png&id=90405&pack_or_individual=pack"
          alt="Foto de perfil">Foto de perfil</li>
    </ul>
  </header>

  <div id="main">
    <div id="imagem">
      <img src="https://logodownload.org/wp-content/uploads/2014/09/google-logo-1.png" alt="Logo do Google">
    </div>
    <input id="pesquisa" type="text" placeholder="Pesquisar no Google">
    <br><br>
    <button>Pesquisar</button>
    <button>Estou com sorte</button>
  </div>

</body>

</html>
