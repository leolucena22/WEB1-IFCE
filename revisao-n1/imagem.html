<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<style>
  .ocultar {
    display: none;
  }
</style>

<body>

  <div class="container-imagem">
    <img
      src="https://images.unsplash.com/photo-1756086807815-d8c4676197dc?q=80&w=387&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
      alt="Imagem">
  </div>

  <button onclick="ocultarImagem()">Ocultar imagem</button>

  <script>
    const imagem = document.querySelector('.container-imagem');

    function ocultarImagem() {
      imagem.classList.toggle('ocultar');
    }
  </script>

</body>

</html>
